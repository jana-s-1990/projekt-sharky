<!DOCTYPE html>
<html lang="de" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharkie</title>

    <link rel="icon" href="img/favicon/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="img/favicon/favicon.png" sizes="32x32" />
    <link rel="icon" href="img/favicon/favicon.ico" />

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <script src="models/drawable-object.class.js"></script>
    <script src="models/movable-object.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/life-bar.class.js"></script>
    <script src="models/coin-bar-class.js"></script>
    <script src="models/poison-bar.class.js"></script>
    <script src="models/creature.class.js"></script>

    <script src="models/coin.class.js"></script>
    <script src="models/poison.class.js"></script>
    <script src="models/fish.class.js"></script>
    <script src="models/fish-green.class.js"></script>
    <script src="models/fish-orange.class.js"></script>
    <script src="models/fish-pink.class.js"></script>
    <script src="models/jelly-fish.class.js"></script>
    <script src="models/jelly-fish-lila.class.js"></script>
    <script src="models/jelly-fish-yellow.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/light.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/audio-manager.class.js"></script>
    <script src="models/level.class.js"></script>

</head>
<body>
    <div id="bubble-bg-startscreen" class="bubble-background" aria-hidden="true">
        <span class="bg-bubble"></span>
        <span class="bg-bubble"></span>
        <span class="bg-bubble"></span>
        <span class="bg-bubble"></span>
        <span class="bg-bubble"></span>
        <span class="bg-bubble"></span>
        <span class="bg-bubble"></span>
        <span class="bg-bubble"></span>
    </div>

    <h1>Welcome to Sharkie!</h1>
    <button id="play-music" class="sound-button"><i class="fa-solid fa-volume-high"></i></button>
    <canvas id="canvas" width="720" height="480"class="hidden"></canvas>

    <div id="start-screen">
        <h2>Press Play to dive in</h2>
        <div class="start-screen-buttons">
            <button id="start-button"><img src="img/8.Startscreen/button-start-hai.png" alt="Start Game"></button>
            <button id="help-button"><img src="img/8.Startscreen/button-help.png" alt="Help"></button>
            <button id="settings-button"><img src="img/8.Startscreen/button-settings.png" alt="Settings"></button>
        </div>
    </div>
</body>
</html>
